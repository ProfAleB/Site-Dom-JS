<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Cadastro Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Cadastro de Alunos</h1>
        
        <form id="cadastroForm">
            <input type="text" id="nomeAlun" placeholder="Nome do Aluno" required>
            <input type="number" id="idadeAlun" placeholder="Idade" required>
            <button type="submit" id="btnSalvar">Cadastrar</button>
        </form>

        <hr>

        <h2>Lista de Inscritos</h2>
        <ul id="listaAlunos">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
